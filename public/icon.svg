<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60023"/>
      <stop offset="100%" stop-color="#ff2060"/>
    </linearGradient>
    <!-- Mask: white=visible, black=cut out — creates crescent by hiding part of the moon -->
    <mask id="crescent">
      <rect width="512" height="512" fill="white"/>
      <circle cx="300" cy="232" r="92" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Brand circle — stays within safe zone (r=204 ≈ 80% of 256) -->
  <circle cx="256" cy="256" r="204" fill="url(#g)"/>

  <!-- Crescent moon: white circle masked to crescent shape -->
  <circle cx="256" cy="256" r="94" fill="white" mask="url(#crescent)"/>
</svg>
