<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A1A" />
      <stop offset="100%" style="stop-color:#000000" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="100%" style="stop-color:#FFD70088" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="24" />
  <rect x="40" y="80" width="320" height="200" rx="16" fill="url(#accent)" opacity="0.15" />
  <!-- Product silhouette -->
  <rect x="120" y="120" width="160" height="120" rx="16" fill="url(#accent)" opacity="0.3" />
  <circle cx="200" cy="180" r="40" fill="url(#accent)" opacity="0.4" />
  <text x="200" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FFD700">Insomnia Cookies</text>
  <text x="200" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#888">Driver's Fast-Pick</text>
  <text x="200" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555">Sweet News</text>
</svg>